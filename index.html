<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDex</title>
    <script src="./javascript/setup.js"></script>
    <script src="./javascript/pokemon-list.js"></script>
    <script src="./javascript/pokemon-info.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous">
</head>
<body onload="getAllNames()" class="row">
    <!--Setup Loading Div-->
    <div id="loading-div">
        <img src="src/pokeball-icon.png" class="loading-ball">
    </div>

    <!--Search Bar and render search pokemon-->
    <div id="pokedex-list" class="column">

        <!--Search Bar-->
        <div id="search-bar-container" class="row container margin-40">
            <input id="search-input" onkeydown="search()" placeholder="Search your Pok&egrave;mon!">
            <div id="start-search-button" class="center">
                <img src="src/pokeball-icon.png" class="search-ball">
            </div>
        </div>

        <div id="pokedex-list-render-container">
            <!--Render here-->
        </div>
    </div>
    
    <!--responsive current pokemon-->
    <div id="current-pokemon-responsive-background" class="hide"></div>
    <div id="current-pokemon-responsive-close" class="hide" onclick="closePokemonInfo()"><img src="src/close-icon.png"></div>

    <!--current selected pokemon-->
    <div id="current-pokemon-container" class="container column center">
    

        <img id="current-pokemon-image" src="src/no-selection-removebg-preview.png">

        <!--Info-->
        <div id="current-pokemon-info" class="hide">
            <!--Id-->
            <span id="current-pokemon-id" class="font-size-12 bold">#213</span>
            
            <!--name-->
            <h2 id="current-pokemon-name">Pikachu</h2>

            <!--types-->
            <div id="current-pokemon-types" class="row center"></div>

            <!--description-->
            <h4>POK&Egrave;DEX ENTRY</h4>
            <span id="current-pokemon-description"></span>

            <!--height and weight-->
            <div class="row center">
                <div class="width-100 column center margin-5">
                    <h4>HEIGHT</h4>
                    <div  id="current-pokemon-height" class="pokemon-info-variable-container"></div>
                </div>
                <div class="width-100 column center margin-5">
                    <h4>WEIGHT</h4>
                    <div id="current-pokemon-weight" class="pokemon-info-variable-container"></div>
                </div>
            </div>

            <!--abilities-->
            <div class="column">
                <h4>ABILITIES</h4>
                <div class="row">
                    <div id="current-pokemon-abilitiy-0" class="pokemon-info-variable-container"></div>
                    <div id="current-pokemon-abilitiy-1" class="pokemon-info-variable-container"></div>
                </div>
            </div>

            <!--stats-->
            <h4>STATS</h4>
            <div class="row center" id="stats-box">
                <div class="current-pokemon-stats-container column" id="hp-stats-container">
                    <div class="current-pokemon-stats-name" style="background: #DF2140">
                        HP
                    </div>
                    <h5 id="current-pokemon-stats-hp">84</h5>
                </div>
                <div class="current-pokemon-stats-container column" id="atk-stats-container">
                    <div class="current-pokemon-stats-name" style="background: #FF994D">
                        ATK
                    </div>
                    <h5 id="current-pokemon-stats-atk">84</h5>
                </div>
                <div class="current-pokemon-stats-container column" id="def-stats-container">
                    <div class="current-pokemon-stats-name" style="background: #eecd3d">
                        DEF
                    </div>
                    <h5 id="current-pokemon-stats-def">84</h5>
                </div>
                <div class="current-pokemon-stats-container column" id="spa-stats-container">
                    <div class="current-pokemon-stats-name" style="background: #2fc4ff">
                        SpA
                    </div>
                    <h5 id="current-pokemon-stats-spa">84</h5>
                </div>
                <div class="current-pokemon-stats-container column" id="spd-stats-container">
                    <div class="current-pokemon-stats-name" style="background: #96da83">
                        SpD
                    </div>
                    <h5 id="current-pokemon-stats-spd">84</h5>
                </div>
                <div class="current-pokemon-stats-container column" id="SPD-stats-container">
                    <div class="current-pokemon-stats-name" style="background: #FB94A8">
                        SPD
                    </div>
                    <h5 id="current-pokemon-stats-speed">84</h5>
                </div>
                <div class="current-pokemon-stats-container column" style="background: #88AAEA">
                    <div class="current-pokemon-stats-name" style="background: #7195DC">
                        TOT
                    </div>
                    <h5 id="current-pokemon-stats-total">84</h5>
                </div>
            </div>

            <!--Evolution chain-->
            <div id="current-pokemon-evolution-chain-container">
                <h4>EVOLUTION</h4>
                <div class="row center">
                    <img id="current-pokemon-evolution-0" class="current-pokemon-evolution-image" src="./src/pokeball-icon.png">
                    <div id="current-pokemon-evolution-level-0" class="current-pokemon-evolution-level-container font-size-12 bold">Lv1 16</div>
                    <img id="current-pokemon-evolution-1" class="current-pokemon-evolution-image" src="./src/pokeball-icon.png">
                    <div id="current-pokemon-evolution-level-1"class="current-pokemon-evolution-level-container font-size-12 bold">Lv1 36</div>
                    <img id="current-pokemon-evolution-2" class="current-pokemon-evolution-image" src="./src/pokeball-icon.png">
                </div>
            </div>

            <!--Next and Previous Container-->
            <div class = "row center">
                <button id="back-button" class = "arrow-button" onclick="setUpPokemonNextPrev()"><img id="back-icon" class="arrow row" src="./src/back-icon-removebg-preview.png"></button>
                <div id="current-pokemon-indexes-container">
                    <div id = "left-side" class="left-side-indexes row">
                        <div><img id="previous-pokemon-in-list" class="current-pokemon-prev" src="./src/pokeball-icon.png"></div>
                        <div><span id="prev-pokemon-index-name" class="font-size-12 bold">Prinlup </span></div>
                        <div><span id="back-pokemon-index" class="font-size-12">#213</span></div>
                    </div>
                    
                    <div id = "right-side" class="right-side-indexes row">
                        <div><span id="next-pokemon-index-name" class="font-size-12 bold">Starly </span></div>
                        <div><span id="next-pokemon-index" class="font-size-12">#213</span></div>
                        <div><img id="next-pokemon-in-list" class="current-pokemon-next" src="./src/pokeball-icon.png"></div>
                    </div>
                </div>
                <button id="next-button" class = "arrow-button" onclick="setUpPokemonNextPrev()"><img id="next-icon" class = "arrow row" src="./src/next-icon.png"></button>
            </div>
        </div>

        <!--Empty-->
        <div id="current-pokemon-empty">
            <span class="font-size-18">Select a Pokemon<br>to display here.</span>
        </div>
    </div>

    <!--Back to top button-->
    <div id="back-to-top-button" class="hide" onclick="backToTop()">
        <img src="src/arrow-up-icon.png">
    </div>

    <!--Loading selected pokemon-->
    <img id="current-pokemon-loading" src="src/pokeball-icon.png" class="loading-ball">

</body>
</html>
